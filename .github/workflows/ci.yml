name: CI/CD - OAuth2 TaskManager

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: appdb_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt aiosqlite

      - name: Run tests with coverage
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:secret@localhost:5432/appdb_test
          AUTHENTIK_ISSUER: http://localhost:9000/application/o/taskmanager/
          AUTHENTIK_JWKS_URL: http://localhost:9000/application/o/taskmanager/jwks/
        run: |
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=term-missing
          echo "Pytest finished, forcing exit"
          kill -9 $(pgrep -f pytest) || true

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          fail_ci_if_error: false

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & build
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:8000
          VITE_AUTHENTIK_URL: http://localhost:9000
          VITE_CLIENT_ID: taskmanager-client
          VITE_REDIRECT_URI: http://localhost:3000/callback
        run: |
          npm ci
          npm run build

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: taskmanager-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: taskmanager-frontend:${{ github.sha }}
          build-args: |
            VITE_API_URL=http://localhost:8000
            VITE_AUTHENTIK_URL=http://localhost:9000
            VITE_CLIENT_ID=taskmanager-client
            VITE_REDIRECT_URI=http://localhost:3000/callback
          cache-from: type=gha
          cache-to: type=gha,mode=max
